name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt
          python -m pip install ruff

      - name: Compile Python
        run: python -m compileall -q apps/api/src collectors/linux_remote/src

      - name: Ruff
        run: python -m ruff check apps/api/src collectors/linux_remote/src apps/api/tests

      - name: Pytest
        env:
          SECRET_KEY: ci-only-not-a-real-secret-safe-for-automated-testing-1234
          DEBUG: "true"
          ENVIRONMENT: development
        run: |
          python -m pytest apps/api/tests -q \
            --ignore=apps/api/tests/test_qwen_ollama_accuracy.py \
            --ignore=apps/api/tests/test_agent_loop.py \
            --ignore=apps/api/tests/test_ai_operator_approval_store_industry.py \
            --ignore=apps/api/tests/test_ai_operator_exec_policy.py \
            --ignore=apps/api/tests/test_ai_operator_integration.py \
            --ignore=apps/api/tests/test_ai_operator_intel_authz.py \
            --ignore=apps/api/tests/test_ai_operator_provider_contract.py \
            --ignore=apps/api/tests/test_ai_operator_read_authz.py \
            --ignore=apps/api/tests/test_ai_operator_write_authz.py

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Lint
        run: npm --prefix apps/web run lint

      - name: Type-check
        run: npm --prefix apps/web run type-check -- --pretty false

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm --prefix apps/web run build

  release-hygiene:
    name: Release Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Tracked sensitive file check
        run: |
          FOUND="$(git ls-files | grep -E '(^|/)\.env$|(^|/)\.env\.(local|production|prod|dev|development)$|settings\.local\.json$|\.pem$|\.key$|\.p12$|\.pfx$|\.ccache$|\.kirbi$|\.ticket$|krb5cc|(^|/)node_modules/|(^|/)\.next/|(^|/)__pycache__/|(^|/)\.pytest_cache/|(^|/)\.ruff_cache/' || true)"
          if [ -n "$FOUND" ]; then
            echo "Sensitive/generated files are tracked:"
            printf '%s\n' "$FOUND"
            exit 1
          fi

      - name: Tracked secret pattern check
        run: |
          HITS="$(git grep -Il -e '-----BEGIN .*PRIVATE KEY-----' -e 'AKIA[0-9A-Z]\{16\}' -e 'AIza[0-9A-Za-z_-]\{30,\}' -e 'gh[pousr]_[0-9A-Za-z_]\{20,\}' -e 'xox[baprs]-[0-9A-Za-z-]\{10,\}' -e 'sk-proj-[A-Za-z0-9_-]\{20,\}' -- . ':!*.example' ':!*.md' ':!package-lock.json' ':!.github/workflows/ci.yml' ':!scripts/release_check.sh' ':!scripts/check_release_archive.sh' || true)"
          if [ -n "$HITS" ]; then
            echo "Possible tracked secret values found in:"
            printf '%s\n' "$HITS"
            exit 1
          fi

      - name: Release archive safety
        run: |
          bash scripts/release.sh ci-test
          bash scripts/check_release_archive.sh adbygod-ci-test.tar.gz
