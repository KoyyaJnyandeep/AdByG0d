[pytest]
# Exclude the live-LLM accuracy suite: it calls a running Ollama server
# (localhost:11434) which is not part of CI/this project's test scope.
# (The mock-based ai_operator_* logic/authz tests still run.)
addopts = -q --ignore=tests/test_qwen_ollama_accuracy.py
pythonpath = src
asyncio_default_fixture_loop_scope = function
asyncio_mode = auto
markers =
    neo4j: test requires a running Neo4j container
